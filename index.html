<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Login Form</title>

<style>
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:Arial, sans-serif;
}

body{
    height:100vh;
    display:flex;
    justify-content:center;
    align-items:center;
    background:linear-gradient(135deg,#0f172a,#1e293b,#334155);
}

.login-box{
    width:350px;
    padding:40px;
    background:rgba(255,255,255,0.08);
    backdrop-filter:blur(12px);
    border:1px solid rgba(255,255,255,0.15);
    border-radius:20px;
    box-shadow:0 10px 30px rgba(0,0,0,.3);
}

.login-box h2{
    color:white;
    text-align:center;
    margin-bottom:30px;
}

.input-box{
    margin-bottom:20px;
}

.input-box input{
    width:100%;
    padding:14px;
    border:none;
    outline:none;
    border-radius:10px;
    background:rgba(255,255,255,0.1);
    color:white;
    font-size:16px;
}

.input-box input::placeholder{
    color:#cbd5e1;
}

.input-box:hover{
  transform:translateY(-2px);
}

.options{
    display:flex;
    justify-content:space-between;
    color:white;
    font-size:14px;
    margin-bottom:20px;
}

.options a{
    color:#60a5fa;
    text-decoration:none;
}

button{
    width:100%;
    padding:14px;
    border:none;
    border-radius:10px;
    background:#3b82f6;
    color:white;
    font-size:16px;
    cursor:pointer;
    transition:.3s;
}

button:hover{
    transform:translateY(-2px);
}

.signup{
    text-align:center;
    color:white;
    margin-top:20px;
    font-size:14px;
}

.signup a{
    color:#60a5fa;
    text-decoration:none;
}
</style>
</head>
<body>

<div class="login-box">
    <h2>Login</h2>

    <div class="input-box">
        <input type="email" placeholder="Email">
    </div>

    <div class="input-box">
        <input type="password" placeholder="Password">
    </div>

    <div class="options">
        <label>
            <input type="checkbox"> Remember
        </label>
        <a href="#">Forgot Password?</a>
    </div>

    <button>Sign In</button>

    <div class="signup">
        Don't have an account?
        <a href="#">Register</a>
    </div>
</div>

</body>
</html>
